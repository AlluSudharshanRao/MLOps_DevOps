# Persistent storage for MLflow DB + artifacts (survives pod restarts).
# k3s: local-path is typical. OpenStack CSI: set storageClassName to your cluster class.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: ml-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

---
# Installs the Sealed Secrets controller into kube-system (GitOps-friendly secret encryption).
# Expects k3s and ~/.kube/config from k3s_install; repo at /opt/mlops_project (same as deploy_platform).
# Run: ansible-playbook -i ../inventory.ini playbooks/install_sealed_secrets_controller.yml
# Client tool kubeseal: install on your laptop or VM — see k8s/addons/sealed-secrets/README.md
- name: Install Sealed Secrets controller
  hosts: chameleon
  become: true
  gather_facts: false
  vars:
    kubeconfig_path: "/home/{{ ansible_user }}/.kube/config"
    repo_root: "/opt/mlops_project"
  tasks:
    - name: Ensure git is installed
      ansible.builtin.package:
        name: git
        state: present

    - name: Ensure repo root directory exists
      ansible.builtin.file:
        path: "{{ repo_root }}"
        state: directory
        mode: "0755"

    - name: Copy k8s manifests to VM (includes addons/sealed-secrets)
      ansible.builtin.copy:
        src: "../../../k8s/"
        dest: "{{ repo_root }}/k8s/"
        mode: "0644"

    - name: Apply Sealed Secrets controller (kustomize)
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        apply -k {{ repo_root }}/k8s/addons/sealed-secrets/

    - name: Wait for sealed-secrets controller rollout (label from upstream chart)
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        rollout status deployment -n kube-system
        -l app.kubernetes.io/name=sealed-secrets
        --timeout=120s
      register: sealed_rollout
      changed_when: false
      failed_when: sealed_rollout.rc != 0

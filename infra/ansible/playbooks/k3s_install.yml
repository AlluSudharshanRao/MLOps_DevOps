- name: Install k3s on Chameleon VM
  hosts: chameleon
  become: true
  vars:
    k3s_install_url: "https://get.k3s.io"
    k3s_exec: "server --write-kubeconfig-mode 644"
  tasks:
    - name: Ensure curl is installed
      ansible.builtin.package:
        name: curl
        state: present

    - name: Install k3s (single-node)
      ansible.builtin.shell: |
        curl -sfL {{ k3s_install_url }} | INSTALL_K3S_EXEC="{{ k3s_exec }}" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Create kubeconfig directory for remote user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy kubeconfig for remote user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"


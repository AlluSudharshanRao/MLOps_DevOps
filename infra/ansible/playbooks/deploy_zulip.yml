- name: Deploy Zulip via Helm chart (docker-zulip)
  hosts: chameleon
  become: true
  gather_facts: false
  vars:
    kubeconfig_path: "/home/{{ ansible_user }}/.kube/config"
    project_id_suffix: "proj99"
    release_name: "zulip-{{ project_id_suffix }}"
    zulip_k8s_namespace: "zulip"

    # Provide at runtime with -e
    zulip_chart_dir: ""
    zulip_values_file: ""
    zulip_secret_values_file: ""
  tasks:
    - name: Fail if zulip_chart_dir not provided
      ansible.builtin.fail:
        msg: "Clone https://github.com/zulip/docker-zulip and pass -e zulip_chart_dir=/path/to/docker-zulip/helm/zulip"
      when: zulip_chart_dir | length == 0

    - name: Check whether Helm is installed
      ansible.builtin.command: helm version
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Install Helm 3 (upstream install script)
      when: helm_check.rc != 0
      ansible.builtin.shell: |
        set -e
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        executable: /bin/bash

    - name: Verify Helm after install
      ansible.builtin.command: helm version

    - name: Ensure namespace exists
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        create namespace {{ zulip_k8s_namespace }}
      register: ns_create
      failed_when: ns_create.rc != 0 and ("AlreadyExists" not in (ns_create.stderr | default("")))

    - name: Update chart dependencies
      ansible.builtin.command: helm dependency update {{ zulip_chart_dir }}

    - name: Install/upgrade Zulip chart
      ansible.builtin.command: >
        helm upgrade --install {{ release_name }} {{ zulip_chart_dir }}
        --namespace {{ zulip_k8s_namespace }}
        --kubeconfig {{ kubeconfig_path }}
        {% if zulip_values_file | length > 0 %}-f {{ zulip_values_file }}{% endif %}
        {% if zulip_secret_values_file | length > 0 %}-f {{ zulip_secret_values_file }}{% endif %}


---
# Copies k8s/ manifests to the VM and applies base namespaces + MLflow (Kustomize).
# Expects k3s and ~/.kube/config from k3s_install. Repo path on VM: /opt/mlops_project.
# Run: ansible-playbook -i ../inventory.ini playbooks/deploy_platform.yml
- name: Deploy namespaces + MLflow platform service
  hosts: chameleon
  become: true
  gather_facts: false
  vars:
    kubeconfig_path: "/home/{{ ansible_user }}/.kube/config"
    repo_root: "/opt/mlops_project"
  tasks:
    - name: Ensure git is installed
      ansible.builtin.package:
        name: git
        state: present

    - name: Ensure repo root directory exists
      ansible.builtin.file:
        path: "{{ repo_root }}"
        state: directory
        mode: "0755"

    - name: Copy manifests to VM (expects repo present locally)
      ansible.builtin.copy:
        src: "../../../k8s/"
        dest: "{{ repo_root }}/k8s/"
        mode: "0644"

    - name: Apply namespaces
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        apply -f {{ repo_root }}/k8s/base/namespaces.yaml

    - name: Apply MLflow kustomize
      ansible.builtin.command: >
        kubectl --kubeconfig {{ kubeconfig_path }}
        apply -k {{ repo_root }}/k8s/platform/mlflow/

